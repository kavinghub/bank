{% load static %}

<!-- Hamburger toggle — visible only on mobile via CSS -->
<button class="sidebar__toggle" id="sidebarToggle" aria-label="Toggle menu">
  <span></span>
  <span></span>
  <span></span>
</button>

<nav class="sidebar" id="mainSidebar">
  <div class="sidebar__top">
    <a href="{% url 'dashboard' %}" class="brand brand--sm">
      <div class="brand__icon">₹</div>
      <span class="brand__name">HDF</span>
    </a>
  </div>

  <ul class="sidebar__nav">
    <li>
      <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}nav-link--active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
    </li>
    <li>
      <a href="{% url 'deposit' %}" class="nav-link {% if request.resolver_match.url_name == 'deposit' %}nav-link--active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Deposit
      </a>
    </li>
    <li>
      <a href="{% url 'withdraw' %}" class="nav-link {% if request.resolver_match.url_name == 'withdraw' %}nav-link--active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
        Withdraw
      </a>
    </li>
    <li>
      <a href="{% url 'balance' %}" class="nav-link {% if request.resolver_match.url_name == 'balance' %}nav-link--active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Balance
      </a>
    </li>
    <li>
      <a href="{% url 'transactions' %}" class="nav-link {% if request.resolver_match.url_name == 'transactions' %}nav-link--active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        History
      </a>
    </li>
  </ul>

  <div class="sidebar__bottom">
    <div class="user-chip">
      <div class="user-chip__avatar">{{ request.session.user_name|slice:":1"|upper }}</div>
      <div class="user-chip__info">
        <span class="user-chip__name">{{ request.session.user_name }}</span>
        <span class="user-chip__role">Account Holder</span>
      </div>
    </div>
    <a href="{% url 'logout' %}" class="nav-link nav-link--logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </a>
  </div>
</nav>
